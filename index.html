<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weltinfos - Suche</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🌍 Weltinfos</h1>
        <p>Alle Zeitzonen der Welt und Wetterinfos auf einen Blick!</p>
        <div class="search-wrapper">
          <input type="text" id="search-input" placeholder="Stadt suchen..." />
          <button class="clear-btn" id="clear-btn">✕</button>
        </div>
        <div class="sync-status" id="sync-status">
          ⏳ Zeit wird synchronisiert...
        </div>
      </header>

      <div class="status" id="status-message">
        Tippe etwas ein, um eine Stadt zu suchen.
      </div>

      <section
        class="favorites-section"
        id="favorites-section"
        style="display: none"
      >
        <h2 class="favorites-title">⭐ Deine Favoriten</h2>
        <div class="clocks-grid" id="favorites-container"></div>
      </section>

      <h2 class="section-title" id="all-title" style="display: none">
        🌐 Alle Zeitzonen
      </h2>
      <div class="clocks-grid" id="clocks-container"></div>
    </div>

    <!-- Detail-Overlay -->
    <div class="detail-overlay" id="detail-overlay" aria-hidden="true">
      <button class="detail-close" id="detail-close">← Zurück</button>
      <button class="detail-star-btn" id="detail-star-btn">☆</button>
      <div class="detail-content">
        <div class="detail-zone" id="detail-zone">—</div>
        <div class="detail-time" id="detail-time">--:--:--</div>
        <div class="detail-date" id="detail-date">...</div>
        <div class="detail-offset" id="detail-offset"></div>

        <div class="detail-weather">
          <div class="weather-info" id="weather-info" style="display: none">
            <span class="weather-icon" id="weather-icon"></span>
            <span class="weather-temp" id="weather-temp">--°C</span>
            <span class="weather-desc" id="weather-desc">--</span>
          </div>
          <div class="weather-loading" id="weather-loading">
            🌤️ Wetter wird geladen...
          </div>
          <div class="weather-error" id="weather-error" style="display: none">
            Wetter für diese Zone nicht verfügbar
          </div>
        </div>

        <div id="forecast-container" style="display: none">
          <h3 class="section-title">📅 7-Tage-Vorschau</h3>
          <div class="forecast-scroll" id="forecast-scroll"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
