<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weltinfos - Suche</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🌍 Weltinfos</h1>
        <p>Alle Zeitzonen der Welt und Wetterinfos auf einen Blick!</p>

        <div class="search-wrapper">
          <input
            type="text"
            id="search-input"
            placeholder="Zeitzone suchen (z. B. Berlin, Tokyo, New York)..."
            autocomplete="off"
          />
          <button id="clear-btn" class="clear-btn" aria-label="Suche leeren">
            ✕
          </button>
        </div>

        <button id="show-all-btn" class="show-all-btn">
          Alle Zeitzonen anzeigen
        </button>

        <p id="status-message" class="status">
          Tippe etwas ein oder klicke auf "Alle anzeigen".
        </p>
      </header>

      <div id="clocks-container" class="clocks-grid"></div>
    </div>

    <!-- ===== VOLLBILD-DETAILANSICHT ===== -->
    <div id="detail-overlay" class="detail-overlay" aria-hidden="true">
      <button id="detail-close" class="detail-close" aria-label="Zurück">
        ← Zurück
      </button>
      <div class="detail-content">
        <div id="detail-zone" class="detail-zone">—</div>
        <div id="detail-time" class="detail-time">--:--:--</div>
        <div id="detail-date" class="detail-date">…</div>
        <div class="detail-weather" id="detail-weather">
          <div class="weather-loading" id="weather-loading">
            🌤️ Wetter wird geladen...
          </div>

          <div class="weather-info" id="weather-info" style="display: none">
            <span class="weather-icon" id="weather-icon"></span>
            <span class="weather-temp" id="weather-temp">--°C</span>
            <span class="weather-desc" id="weather-desc">--</span>
          </div>

          <div
            class="weather-error"
            id="weather-error"
            style="display: none; color: #ff6b6b"
          >
            Wetter für diese Zone nicht verfügbar
          </div>
        </div>

        <!-- 7-TAGE-VORSCHAU -->
        <div
          class="forecast-container"
          id="forecast-container"
          style="display: none"
        >
          <h3
            style="
              color: var(--text-secondary);
              margin: 20px 0 12px;
              font-size: 1rem;
              letter-spacing: 1px;
            "
          >
            📅 7-Tage-Vorschau
          </h3>
          <div class="forecast-scroll" id="forecast-scroll"></div>
        </div>
        <div id="detail-offset" class="detail-offset"></div>
      </div>
    </div>
    <!-- ===== ENDE VOLLBILD-DETAILANSICHT ===== -->

    <script src="script.js"></script>
  </body>
</html>
